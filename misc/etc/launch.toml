## Linux first-choice ALSA candidate.  Compiled only with
## `--features alsa-real`; otherwise FirstAvailable falls through to
## the mock candidate below.  Replace `hw_spec` to match your
## hardware -- `arecord -L` enumerates available capture PCMs.
[[mic.candidates]]
id = "linux-default"
channels = [0]

[mic.candidates.source]
kind = "alsa"
hw_spec = "hw:CARD=EarPods,DEV=0"
# 960 frames at 48 kHz is 20 ms, matching the Opus stream frame.
period_size = 960
buffer_size = 3840

[[mic.candidates]]
id = "default-mock"
channels = [0]

[mic.candidates.source]
kind = "mock"
period_size = 512
sample_rate = 44100

[[mic.candidates.source.waveforms]]
kind = "sine"
freq_hz = 1000.0
amplitude = 0.25

[stream]
uds_path = "misc/share/acousticsd.sock"
uds_mode = 438
tcp_bind = "127.0.0.1:8787"
broadcast_capacity = 64

[[backbone.candidates]]
kind = "rknn"
path = "misc/backbones/backbone.rknn"

[[backbone.candidates]]
kind = "burn"
path = "misc/backbones/backbone.mpk"

[head.default]
path = "misc/heads/default/head.mpk"
labels_path = "misc/heads/default/labels.txt"

[training_defaults]
epochs = 32
batch_size = 16
learning_rate_e6 = 100

[file]
max_upload_bytes = 268435456
max_concurrent_uploads = 4
